<!DOCTYPE html>
<html>
<head>
  <title>Careerate</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="popup.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo-container">
        <div class="logo">C</div>
        <span class="brand-name">Careerate</span>
      </div>
      <div class="user-status">
        <div class="user-avatar">
          <span class="user-initial">U</span>
        </div>
        <span class="user-name">Guest</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <div class="welcome-message" id="welcomeMessage">
        <h2>Welcome to Careerate!</h2>
        <p>Your AI-powered career acceleration platform</p>
      </div>

      <div class="quick-actions">
        <button class="action-button primary" id="analyzePage">
          <span class="icon">🔍</span>
          Analyze Page
        </button>
        <button class="action-button secondary" id="viewInsights">
          <span class="icon">📊</span>
          View Insights
        </button>
      </div>

      <div class="stats-container">
        <div class="stat-item">
          <span class="stat-value">0</span>
          <span class="stat-label">Tools Found</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">0</span>
          <span class="stat-label">Insights</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <button class="footer-button" id="openDashboard">
        Open Dashboard
      </button>
      <button class="footer-button" id="settings">
        Settings
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
