<!DOCTYPE html>
<html>
<head>
  <title>Careerate</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="popup.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo-container">
        <div class="logo">C</div>
        <span class="brand-name">Careerate</span>
      </div>
      <div class="user-status">
        <div class="user-avatar">
          <span class="user-initial">U</span>
        </div>
        <span class="user-name">Guest</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="popup-content" style="text-align:center;">
      <div class="welcome-message" id="welcomeMessage">
        <h2 style="color:#3b82f6;">Welcome to Careerate!</h2>
        <p style="color:#7c3aed;">Your AI-powered career acceleration platform.</p>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-value">0</span>
          <span class="stat-label">AI Tools Found</span>
        </div>
        <div class="stat">
          <span class="stat-value">0</span>
          <span class="stat-label">Insights</span>
        </div>
      </div>
      <div class="actions">
        <button id="analyzePage" class="footer-button" style="background:linear-gradient(90deg,#3b82f6,#7c3aed);color:#fff;">Analyze This Page</button>
        <button id="viewInsights" class="footer-button" style="background:linear-gradient(90deg,#7c3aed,#3b82f6);color:#fff;">View Insights</button>
        <button id="openDashboard" class="footer-button" style="background:linear-gradient(90deg,#3b82f6,#7c3aed);color:#fff;">Open Dashboard</button>
        <button id="settings" class="footer-button" style="background:linear-gradient(90deg,#7c3aed,#3b82f6);color:#fff;">Settings</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span style="color:#3b82f6;font-weight:600;">© 2025 Careerate</span>
      <span style="color:#7c3aed;">•</span>
      <span style="color:#7c3aed;">Made with <span style="color:#A3BE8C;">♥</span> for your career</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
