<!DOCTYPE html>
<html>
<head>
  <title>Careerate</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="popup.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo-container">
        <div class="logo">C</div>
        <span class="brand-name">Careerate</span>
      </div>
      <div class="user-status">
        <div class="user-avatar">
          <span class="user-initial">U</span>
        </div>
        <span class="user-name">Guest</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="popup-content">
      <div class="agent-selector-container">
        <label for="agentSelector" class="agent-label">Select Agent:</label>
        <select id="agentSelector" class="agent-selector">
          <option value="Auto" selected>🤖 Auto-Select</option>
          <!-- Options will be populated by popup.js -->
        </select>
      </div>
      
      <div class="chat-container">
        <div id="chatMessages" class="chat-messages">
          <!-- Chat messages will be appended here -->
        </div>
        <div class="chat-input-container">
          <textarea id="chatInput" class="chat-input" placeholder="Ask your AI team..."></textarea>
          <button id="sendMessage" class="send-button">➤</button>
        </div>
      </div>
      
      <div class="actions">
        <button id="openDashboard" class="footer-button">Dashboard</button>
        <button id="settings" class="footer-button">Settings</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span style="color:#3b82f6;font-weight:600;">© 2025 Careerate</span>
      <span style="color:#7c3aed;">•</span>
      <span style="color:#7c3aed;">Made with <span style="color:#A3BE8C;">♥</span> for your career</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
