<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerate AI Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Careerate AI Settings</h1>
      <p>Control what the AI agent can see and do on your behalf.</p>
    </header>

    <section class="settings-section">
      <h2>Permissions</h2>
      <div class="setting-item">
        <input type="checkbox" id="allow-page-reading" name="allow-page-reading">
        <label for="allow-page-reading">
          <strong>Read Page Content</strong>
          <span>Allows the agent to read the text and structure of the pages you visit to provide context.</span>
        </label>
      </div>
      <div class="setting-item">
        <input type="checkbox" id="allow-form-filling" name="allow-form-filling">
        <label for="allow-form-filling">
          <strong>Automate Form Filling</strong>
          <span>Allows the agent to fill in text boxes and select dropdowns based on your commands.</span>
        </label>
      </div>
      <div class="setting-item">
        <input type="checkbox" id="allow-clicking" name="allow-clicking">
        <label for="allow-clicking">
          <strong>Automate Clicks</strong>
          <span>Allows the agent to click buttons and links to navigate and perform actions.</span>
        </label>
      </div>
    </section>

    <button id="save-button" class="save-btn">Save Settings</button>
    <div id="status-message"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
