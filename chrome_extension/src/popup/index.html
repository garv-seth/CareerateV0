<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerate Extension</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <img src="../assets/icons/icon48.png" alt="Careerate Logo" class="logo">
      <h2>Careerate</h2>
    </header>
    <main class="popup-content">
      <p><strong>Status:</strong> <span id="trackingStatus">Loading...</span></p>
      <p><strong>Mode:</strong> <span id="monitoringMode">-</span></p>
      <button id="openOptionsPage" class="options-button">Settings</button>
    </main>
    <footer class="popup-footer">
      <p>AI Career Acceleration</p>
    </footer>
  </div>
  <script type="module" src="index.ts"></script>
</body>
</html>
