<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careerate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <div class="glass-pane">
      <header class="app-header">
        <div class="logo">C</div>
        <h1>Careerate</h1>
      </header>
      
      <main>
        <div class="input-group">
          <label for="agent-select">Select Agent</label>
          <select id="agent-select">
            <option>Loading Agents...</option>
          </select>
        </div>

        <div class="input-group">
          <label for="question-input">Your Question</label>
          <textarea id="question-input" rows="4" placeholder="e.g., How do I secure a Kubernetes cluster?"></textarea>
        </div>
        
        <div class="actions">
          <button id="analyze-button" class="action-btn secondary">Analyze Page</button>
          <button id="submit-button" class="action-btn primary">Ask AI</button>
        </div>
      </main>

      <footer class="app-footer">
        <a href="#" id="open-dashboard">Open Full Dashboard</a>
      </footer>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
