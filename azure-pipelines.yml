# Azure DevOps Pipeline for Careerate Platform
trigger:
- main
- develop

variables:
  azureSubscription: 'Azure-Subscription'
  resourceGroupName: 'careerate-rg'
  appServiceName: 'careerate-app'
  location: 'East US'

stages:
- stage: Build
  displayName: 'Build Application'
  jobs:
  - job: BuildJob
    displayName: 'Build Frontend and Backend'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci
        cd frontend && npm ci
        cd ../backend && npm ci
      displayName: 'Install Dependencies'

    - script: |
        cd frontend && npm run build
      displayName: 'Build Frontend'

    - script: |
        cd backend && npm run build
      displayName: 'Build Backend'

    - script: |
        cp -r frontend/dist/* backend/public/
      displayName: 'Copy Frontend to Backend Public Directory'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: 'backend'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/careerate-backend.zip'
      displayName: 'Archive Backend Files'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
      displayName: 'Publish Artifacts'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure App Service'
    environment: 'production'
    pool:
      vmImage: 'ubuntu-latest'
    
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appServiceName)'
              package: '$(Pipeline.Workspace)/drop/careerate-backend.zip'
              runtimeStack: 'NODE|20-lts'
              startUpCommand: 'npm start'
            displayName: 'Deploy to Azure App Service'