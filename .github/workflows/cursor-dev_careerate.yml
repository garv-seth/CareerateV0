# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Careerate

on:
  push:
    branches:
      - cursor-dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Build project
        run: pnpm run build

      - name: Prepare deployment package structure
        run: |
          mkdir -p deploy/apps/api
          mkdir -p deploy/apps/web
          # Copy API files
          cp -r apps/api/dist deploy/apps/api/
          cp apps/api/package.json deploy/apps/api/
          # Copy Web files
          cp -r apps/web/.next deploy/apps/web/
          if [ -d "apps/web/public" ]; then
            cp -r apps/web/public deploy/apps/web/
          fi
          cp apps/web/package.json deploy/apps/web/
          # Copy workspace files
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp pnpm-workspace.yaml deploy/
          # Copy prisma schema
          cp -r apps/api/prisma deploy/apps/api/
      
      - name: Install production dependencies in deployment package
        working-directory: ./deploy
        run: pnpm install --prod

      - name: Zip artifact for deployment
        working-directory: ./deploy
        run: zip ../release.zip . -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C5AB63C2BC2442BCB25E849A52FF175F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_823AE88CAACA4270AEE07230D5DB7AE8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4C67B4F60A9944BDA2BE54A65E005916 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Careerate'
          slot-name: 'Production'
          package: .
          startup-command: 'pnpm --filter api start'
          