# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Careerate

on:
  push:
    branches:
      - cursor-dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Build web app
        run: |
          # Install dependencies (no frozen lockfile due to cross-platform issues)
          pnpm install --no-frozen-lockfile
          
          # Generate Prisma client
          pnpm run prisma:generate
          
          # Build only the web app
          pnpm --filter web build
          
          # Create deployment package with only built files
          cd apps/web
          mkdir -p ../../deploy
          
          # For Next.js standalone build
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/* ../../deploy/
            mkdir -p ../../deploy/.next
            cp -r .next/static ../../deploy/.next/
            cp -r public ../../deploy/ 2>/dev/null || true
          else
            # Fallback: copy entire web directory
            cp -r . ../../deploy/
          fi
          
          cd ../../deploy
          
          # Create a simple start script for Azure
          echo '{
            "name": "careerate-web",
            "version": "1.0.0",
            "scripts": {
              "start": "node server.js || next start -p $PORT || next start -p 8080"
            }
          }' > package.json

      # Skip Azure login - use publish profile directly
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        timeout-minutes: 5
        with:
          app-name: 'Careerate'
          slot-name: 'Production'
          package: deploy
          clean: true
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          