name: Deploy to Azure

on:
  push:
    branches: [ main, cursor-dev ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: Careerate-adaa
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '18.x'
  REGISTRY_NAME: careeratestorage
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v3

    - name: Setup Node ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
        
    - name: 'Install dependencies'
      run: |
        pnpm install --frozen-lockfile
        
    - name: 'Build application'
      run: |
        pnpm run build
        
    - name: 'Build Docker images'
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-api:${{ github.sha }} ./apps/api
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-web:${{ github.sha }} ./apps/web
        
    - name: 'Azure Login'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: 'Push to Azure Container Registry'
      run: |
        az acr login --name ${{ env.REGISTRY_NAME }}
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-api:${{ github.sha }}
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-web:${{ github.sha }}
        
    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: 'production'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: |
          ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-api:${{ github.sha }}
          ${{ env.REGISTRY_NAME }}.azurecr.io/careerate-web:${{ github.sha }}
          
    - name: 'Update App Service Configuration'
      run: |
        az webapp config appsettings set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group Careerate \
          --settings \
          AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
          B2C_CLIENT_ID="${{ secrets.B2C_CLIENT_ID }}" \
          COSMOSDB_CONNECTION_STRING_CENTRALUS="${{ secrets.COSMOSDB_CONNECTION_STRING_CENTRALUS }}" \
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          BRAVESEARCH_API_KEY="${{ secrets.BRAVESEARCH_API_KEY }}" \
          JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
          NODE_ENV="production" 