# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Careerate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package: # Renamed job
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Consistent with your existing setup

      # Build Frontend (client)
      - name: Install and Build Frontend
        working-directory: ./client
        run: |
          npm install
          npm run build --if-present # Assumes this creates client/dist

      # Build Backend (api)
      - name: Install and Build Backend
        working-directory: ./api
        run: |
          npm install --omit=dev # Install production dependencies for backend
          npm run build --if-present # Assumes this creates api/dist

      # Prepare package for deployment
      - name: Create deployment package
        run: |
          mkdir -p deployment_package/api # Create a staging folder for the API
          
          # Copy API files
          cp -r api/dist deployment_package/api/dist
          cp api/package.json deployment_package/api/package.json
          cp api/package-lock.json deployment_package/api/package-lock.json # Important for consistent installs
          
          # Copy client build output into a public folder in the API package
          # Adjust this path if your API server expects client files elsewhere
          mkdir -p deployment_package/api/public 
          cp -r client/dist/* deployment_package/api/public/
          
          # Zip the contents of the api folder within deployment_package
          cd deployment_package/api
          zip -r ../../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app # Keep artifact name consistent for deploy job
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-package # Depends on the renamed job
    # environment: # Temporarily removed for simplicity
    #   name: 'Production'
    #   url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip -d deployed_app # Unzip to a specific directory
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C550AFFAA98D4630A7D2C82EA9E78C32 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D92D139B448048DDB763CD85BEDD395C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BE1CD0EC15D4D9E995CB1CEC6D8544A }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Careerate'
          slot-name: 'production'
          package: deployed_app # Deploy the unzipped package
          # Azure needs to run npm install in the 'api' folder.
          # This might require startup command or post-build script in Azure if node_modules are not packaged.
          # For Node.js, it's common to deploy the package.json and let Azure handle 'npm install'.
          # If 'npm install --omit=dev' was done correctly for 'api' and node_modules are zipped, 
          # then Azure might not need to run install again if the package structure is correct.
          # However, it's generally safer to let Oryx (Azure's build system) handle this.
          # To ensure Oryx rebuilds, usually just deploying the api folder with its package.json is enough.
          # The current zip structure is `release.zip` containing the contents of `deployment_package/api`.
          # So, `package: deployed_app` should point to where server.js (or package.json) is at the root. 