# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - Careerate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Create deployment package
        run: |
          # Create a directory for the deployment package
          mkdir -p release

          # Copy backend build output and necessary files
          cp -r backend/dist release/
          cp backend/package.json release/
          cp backend/package-lock.json release/
          cp backend/startup.sh release/
          
          # Copy frontend build output to the structure the server expects
          mkdir -p release/frontend
          cp -r frontend/dist release/frontend/

          # Install production dependencies for the backend inside the release directory
          echo "--- Installing production dependencies in release directory ---"
          cd release
          npm install --omit=dev
          
          # Zip the contents for deployment
          echo "--- Zipping deployment package ---"
          zip -r ../release.zip .
          echo "--- Deployment package created ---"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C550AFFAA98D4630A7D2C82EA9E78C32 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D92D139B448048DDB763CD85BEDD395C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BE1CD0EC15D4D9E995CB1CEC6D8544A }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Careerate'
          slot-name: "production"
          package: release.zip

